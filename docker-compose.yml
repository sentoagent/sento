# Sentō — Docker Compose example
# Run: docker compose up -d
# Multiple agents: add more services below

services:
  agent:
    build: .
    container_name: sento-agent
    environment:
      - AGENT_NAME=myagent
      - CLAUDE_TOKEN=${CLAUDE_TOKEN}        # Required: sk-ant-oat01-...
      - CHANNELS=discord                    # Comma-separated: discord,telegram,slack,imessage
      # Per-platform tokens (each platform needs its own token):
      - DISCORD_BOT_TOKEN=${BOT_TOKEN}      # Discord bot token
      # - TELEGRAM_BOT_TOKEN=               # Telegram bot token
      # - SLACK_BOT_TOKEN=                  # Slack bot token
      - SERVER_ID=${SERVER_ID}              # Discord server ID (listens to all channels)
      # - CHANNEL_IDS=123,456               # Or specific Discord channel IDs
      - GEMINI_KEY=${GEMINI_KEY}            # Optional: for memory embeddings
      - AGENT_ROLE=General-purpose assistant
      - AGENT_PERSONALITY=Chill, helpful, keeps it real
      - AGENT_CREATOR=John Smith
      - AGENT_TIMEZONE=America/New_York
    volumes:
      - ./data/workspace:/home/sento/workspace  # Persists CLAUDE.md, memory, skills
      - ./data/claude:/home/sento/.claude      # Persists plugins, settings, channels
    ports:
      - "9876:9876"                          # Agent-to-agent comms port
    restart: always

